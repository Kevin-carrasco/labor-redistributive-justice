name: "labor-redistributive-justice"
output_dir: "." # Esto es para que se compile en el rootdir
navbar:
  title: "Redistributive Justice, Job Insecurity, and Perceived Technological Risk: How Labor Market Position Shapes the Legitimacy of the Welfare State in 27 OECD Countries"
  right:
    - text: "Paper"
      href: "paper.html"
    - text: ""
      icon: fa-file-pdf
      href: "paper.pdf"
    - text: ""
      icon: fa-github fa-lg
      href: https://github.com/kevin-carrasco/labor-redistributive-justice

output:
  bookdown::html_document2:
      css: "custom.css"
      theme: flatly
  bookdown::pdf_document2:
    template: null
    number_sections: false
    toc: false
    keep_tex: false
    pandoc_args:
      - --template=input/mytemplate.tex #custom template para usar autores con afiliacion
